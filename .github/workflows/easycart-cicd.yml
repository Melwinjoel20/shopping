name: EasyCart CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build & Analyse
  # ─────────────────────────────────────────────
  build:
    name: Build & Analyse
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt
        
      # 5. Bundle
      - name: Create deployment bundle
        run: |
          zip -r ../app.zip . \
            -x "env/*" "**/__pycache__/*" ".git/*" ".github/*" "*.pyc" "*.egg-info/*"

      # 6. Upload artifact (shared with deploy job)
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: easycart-app-zip
          path: ./app.zip
          retention-days: 5

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy  (skipped on pull requests)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build                          # only runs after build succeeds
    if: github.event_name != 'pull_request'   # never deploy on PRs

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python (EB CLI needs 3.9)
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      # 3. EB CLI
      - name: Install EB CLI
        run: |
          python -m pip install --upgrade pip
          pip install awsebcli

      # 4. AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # 5. Sanity-check the environment exists before we try to deploy
      - name: Verify EB environment exists
        run: |
          aws elasticbeanstalk describe-environments \
            --application-name ${{ secrets.EB_APP_NAME }} \
            --environment-names ${{ secrets.EB_ENV_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      # 6. Deploy
      - name: Deploy to Elastic Beanstalk
        run: |
          eb init ${{ secrets.EB_APP_NAME }} \
            --region ${{ secrets.AWS_REGION }} \
            --platform "Python 3.9 running on 64bit Amazon Linux 2023"
          eb deploy ${{ secrets.EB_ENV_NAME }} \
            --label "deploy-${{ github.run_id }}" \
            --timeout 20
