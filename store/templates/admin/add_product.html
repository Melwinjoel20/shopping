{% extends 'base.html' %}
{% load static %}

{% block hero %}{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 750px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Add New Product</h2>
        <a href="{% url 'admin_dashboard' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} mt-2">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="card shadow-sm border-0 rounded-4 p-4">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold">Category</label>
                <select name="category" class="form-control" required>
                    {% for cat in categories %}
                        <option value="{{ cat }}">
                            {% if cat == "MenClothes" %}
                                Men Clothes
                            {% elif cat == "WomenClothes" %}
                                Women Clothes
                            {% elif cat == "KidsClothes" %}
                                Kids Clothes
                            {% else %}
                                {{ cat }}
                            {% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Product Name</label>
                <input name="name" class="form-control" placeholder="Enter product name" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Description</label>
                <textarea name="description" class="form-control" rows="4" placeholder="Enter product description"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Price (€)</label>
                <input name="price" type="number" step="0.01" class="form-control" placeholder="Enter price" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Product Image</label>
                <input type="file" name="image_file" accept=".png, .jpg, .jpeg" class="form-control" required>
            </div>

            <div class="d-grid">
                <button class="btn btn-success btn-lg rounded-3">
                    <i class="bi bi-cloud-upload"></i> Submit Product
                </button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
