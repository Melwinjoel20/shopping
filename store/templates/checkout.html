{% extends "base.html" %}
{% load static %}

{% block hero %}{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <h2 class="mb-4 fw-bold">🛍 Checkout</h2>

    <div class="row">

        <div class="col-md-7">

            <div class="card shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">Customer Details</h4>

                <form id="checkout-form">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Country</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="country" required>
                            <span class="input-group-text" id="country-flag" style="min-width: 48px; justify-content: center;"></span>
                        </div>
                        <div id="geo-status" class="form-text text-muted" style="display: none;">
                            <span class="spinner-border spinner-border-sm me-1" role="status" style="width: 0.7rem; height: 0.7rem;"></span>
                            Detecting your location...
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address Line 1</label>
                        <input type="text" class="form-control" id="address1" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address Line 2</label>
                        <input type="text" class="form-control" id="address2">
                    </div>

                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" id="city" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Postal Code</label>
                            <input type="text" class="form-control" id="postal" required>
                        </div>
                    </div>

                    <!-- Verify Address Button -->
                    <button type="button" class="btn btn-outline-secondary mt-1 mb-3" onclick="verifyAddress()">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="me-1 mb-1" viewBox="0 0 16 16">
                            <path d="M8 1a5 5 0 0 0-5 5c0 4 5 9 5 9s5-5 5-9a5 5 0 0 0-5-5zm0 7a2 2 0 1 1 0-4 2 2 0 0 1 0 4z"/>
                        </svg>
                        Verify address on map
                    </button>

                    <!-- Map Preview Panel -->
                    <div id="map-section" class="mb-3" style="display: none;">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <small id="map-label" class="text-muted fw-semibold"></small>
                            <small class="text-muted fst-italic">Pin wrong? Edit fields above and verify again.</small>
                        </div>
                        <iframe
                            id="map-frame"
                            width="100%"
                            height="300"
                            frameborder="0"
                            style="border-radius: 8px; border: 1px solid #dee2e6;"
                            allowfullscreen
                            loading="lazy">
                        </iframe>
                    </div>

                </form>

            </div>

            <!-- Payment Section -->
            <div class="card shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">Payment</h4>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="card" checked>
                    <label class="form-check-label">Credit/Debit Card</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="paypal">
                    <label class="form-check-label">PayPal</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="cod">
                    <label class="form-check-label">Cash on Delivery</label>
                </div>

            </div>

        </div>

        <div class="col-md-5">

            <div class="card shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">Order Summary</h4>

                <div id="order-items"></div>
                <div id="tax-line"></div>

                <!-- Delivery fee line — populated by fare calculator -->
                <div id="delivery-line"></div>

                <hr>

                <p class="fw-bold fs-5">
                    Total: <span id="order-total" class="text-primary">€0.00</span>
                </p>

                <button type="button" class="btn btn-success w-100 mt-3" id="place-order-btn">
                    Place Order
                </button>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block extra_scripts %}
<script>
const VIEW_CART_URL = "{{ VIEW_CART_URL }}";
const PLACE_ORDER_URL = "{{ PLACE_ORDER_URL }}";
const USER_ID = "{{ request.session.user_id|default:'' }}";
const ID_TOKEN = "{{ request.session.cognito_id_token|default:'' }}";
const LOGIN_URL = "{% url 'login' %}";
const TAX_API_URL = "https://nxk175t5ol.execute-api.us-east-1.amazonaws.com/prod/tax_calculator";
const FARE_API_URL = "https://0v2jl32vw0.execute-api.us-east-1.amazonaws.com/PROD/fare-calculator";

// Store is always shipping from Cork
const STORE_CITY = "Cork";

// Cities supported by the fare API
const SUPPORTED_CITIES = ["Dublin", "Cork", "Galway", "Limerick", "Waterford", "Belfast"];

// Running totals shared between tax and fare steps
let cartSubtotal = 0;
let deliveryFeeRaw = 0;

// Redirect if not logged in
if (!USER_ID) {
    alert("Please log in to continue.");
    window.location.href = LOGIN_URL;
}

// ── Helpers ──────────────────────────────────────────────────────────────────

function setCountryFlag(code) {
    const flagEl = document.getElementById("country-flag");
    const lower = code.toLowerCase();
    flagEl.innerHTML = `<img src="https://flagcdn.com/24x18/${lower}.png"
        alt="${code}" style="width: 24px; height: 18px; border-radius: 2px;">`;
}

/**
 * Normalise a free-text city name against the supported list.
 * Matches case-insensitively and allows partial prefix matches
 * (e.g. "galway city" → "Galway").
 */
function matchSupportedCity(input) {
    const trimmed = input.trim().toLowerCase();
    return SUPPORTED_CITIES.find(c => trimmed.startsWith(c.toLowerCase())) || null;
}

// ── Geolocation auto-fill ─────────────────────────────────────────────────────

async function autoFillLocation() {
    const statusEl = document.getElementById("geo-status");
    statusEl.style.display = "block";

    try {
        const res = await fetch("/store/get-location/");
        const data = await res.json();

        const countryField = document.getElementById("country");
        const cityField    = document.getElementById("city");

        if (!countryField.value) countryField.value = data.country_name || "Ireland";
        if (!cityField.value)    cityField.value    = data.city || "";

        if (data.country_code) setCountryFlag(data.country_code);

    } catch (err) {
        console.warn("Geolocation auto-fill failed:", err);
        const countryField = document.getElementById("country");
        if (!countryField.value) countryField.value = "Ireland";
        setCountryFlag("IE");
    } finally {
        statusEl.style.display = "none";
    }
}

// ── Address verification ──────────────────────────────────────────────────────

function verifyAddress() {
    const parts = [
        document.getElementById("address1").value.trim(),
        document.getElementById("address2").value.trim(),
        document.getElementById("city").value.trim(),
        document.getElementById("postal").value.trim(),
        document.getElementById("country").value.trim()
    ].filter(Boolean);

    if (parts.length < 2) {
        alert("Please fill in at least your address and city before verifying.");
        return;
    }

    const fullAddress = parts.join(", ");
    const encoded = encodeURIComponent(fullAddress);

    document.getElementById("map-label").textContent = fullAddress;
    document.getElementById("map-frame").src =
        `https://www.google.com/maps?q=${encoded}&output=embed`;
    document.getElementById("map-section").style.display = "block";
}

// ── Tax calculation ───────────────────────────────────────────────────────────

async function calculateAndShowTax(price, countryCode, category) {
    try {
        const res = await fetch(TAX_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ price, country_code: countryCode, category })
        });
        const data = await res.json();

        const taxLine  = document.getElementById("tax-line");

        if (data.tax_rate > 0) {
            taxLine.innerHTML = `
                <div class="d-flex justify-content-between mb-1 text-muted" style="font-size:0.9rem;">
                    <span>Subtotal</span>
                    <span>${data.currency} ${data.original_price.toFixed(2)}</span>
                </div>
                <div class="d-flex justify-content-between mb-2 text-muted" style="font-size:0.9rem;">
                    <span>VAT (${data.tax_rate}%)</span>
                    <span>${data.currency} ${data.tax_amount.toFixed(2)}</span>
                </div>`;

            // Return the tax-inclusive price so the fare step can add on top
            return data.final_price;
        } else {
            taxLine.innerHTML = `
                <div class="d-flex justify-content-between mb-2 text-muted" style="font-size:0.9rem;">
                    <span>VAT</span>
                    <span class="text-success">Zero rated</span>
                </div>`;
            return price;
        }
    } catch (err) {
        console.warn("Tax calculation failed:", err);
        return price; // fall back to raw price
    }
}

// ── Fare / delivery calculation ───────────────────────────────────────────────

async function calculateAndShowFare(destinationCity) {
    const deliveryLine = document.getElementById("delivery-line");
    deliveryFeeRaw = 0;

    const matched = matchSupportedCity(destinationCity);

    if (!matched) {
        // City not covered — show informational note, no delivery fee
        deliveryLine.innerHTML = `
            <div class="d-flex justify-content-between mb-2 text-muted" style="font-size:0.9rem;">
                <span>🚚 Delivery fee</span>
                <span class="text-secondary fst-italic">Contact us for a quote</span>
            </div>`;
        return 0;
    }

    if (matched.toLowerCase() === STORE_CITY.toLowerCase()) {
        // Delivering within Cork — no fare API call needed
        deliveryLine.innerHTML = `
            <div class="d-flex justify-content-between mb-2 text-muted" style="font-size:0.9rem;">
                <span>🚚 Delivery (Cork local)</span>
                <span class="text-success">Free</span>
            </div>`;
        return 0;
    }

    try {
        const res = await fetch(FARE_API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ from: STORE_CITY, to: matched })
        });
        const data = await res.json();

        const fee = Number(data.fare_raw) || 0;
        deliveryFeeRaw = fee;

        deliveryLine.innerHTML = `
            <div class="d-flex justify-content-between mb-1 text-muted" style="font-size:0.9rem;">
                <span>🚚 Delivery (${STORE_CITY} → ${matched})</span>
                <span>€${fee.toFixed(2)}</span>
            </div>
            <div class="text-muted mb-2" style="font-size:0.78rem;">
                ${data.distance_km} km &nbsp;·&nbsp; est. ${data.duration_estimate}
            </div>`;

        return fee;

    } catch (err) {
        console.warn("Fare calculation failed:", err);
        deliveryLine.innerHTML = `
            <div class="d-flex justify-content-between mb-2 text-muted" style="font-size:0.9rem;">
                <span>🚚 Delivery fee</span>
                <span class="text-danger">Unavailable</span>
            </div>`;
        return 0;
    }
}

// ── Order summary (orchestrates both APIs) ────────────────────────────────────

async function loadOrderSummary() {
    const container  = document.getElementById("order-items");
    const totalSpan  = document.getElementById("order-total");

    container.innerHTML = `<p class="text-muted">Loading order summary...</p>`;
    totalSpan.innerHTML = "€0.00";

    try {
        const res = await fetch(`${VIEW_CART_URL}?user_id=${encodeURIComponent(USER_ID)}`);
        const raw = await res.json();

        let items = [];
        if (raw.body) {
            items = JSON.parse(raw.body);
        } else if (Array.isArray(raw)) {
            items = raw;
        }

        container.innerHTML = "";

        if (!items || items.length === 0) {
            container.innerHTML = `<p class="text-muted">Your cart is empty.</p>`;
            totalSpan.innerHTML = "€0.00";
            return;
        }

        let subtotal = 0;

        items.forEach(item => {
            const qty      = Number(item.qty   || 1);
            const price    = Number(item.price || 0);
            const lineTotal = price * qty;
            subtotal += lineTotal;

            container.innerHTML += `
                <div class="d-flex justify-content-between mb-2">
                    <span>${item.name || "Unnamed Product"} (×${qty})</span>
                    <span>€${lineTotal.toFixed(2)}</span>
                </div>
            `;
        });

        cartSubtotal = subtotal;

        // 1️⃣  Tax
        const countryCode  = document.getElementById("country").value.trim().toUpperCase().substring(0, 2) || "IE";
        const priceAfterTax = await calculateAndShowTax(subtotal, countryCode, "general");

        // 2️⃣  Delivery fare
        const cityInput   = document.getElementById("city").value.trim();
        const deliveryFee = await calculateAndShowFare(cityInput);

        // 3️⃣  Grand total
        const grandTotal = priceAfterTax + deliveryFee;
        totalSpan.innerHTML = `€${grandTotal.toFixed(2)}`;

    } catch (err) {
        console.error("Checkout summary error:", err);
        container.innerHTML = `<p class="text-danger">Failed to load order summary.</p>`;
        totalSpan.innerHTML = "€0.00";
    }
}

// ── Place Order ───────────────────────────────────────────────────────────────

document.getElementById("place-order-btn").addEventListener("click", async () => {
    const payload = {
        user_id: USER_ID,
        payment_method: document.querySelector("input[name='paymentMethod']:checked").value,
        customer: {
            full_name: document.getElementById("fullName").value.trim(),
            email:     document.getElementById("email").value.trim(),
            phone:     document.getElementById("phone").value.trim(),
            country:   document.getElementById("country").value.trim(),
            address1:  document.getElementById("address1").value.trim(),
            address2:  document.getElementById("address2").value.trim(),
            city:      document.getElementById("city").value.trim(),
            postal:    document.getElementById("postal").value.trim()
        }
    };

    if (
        !payload.customer.full_name ||
        !payload.customer.email    ||
        !payload.customer.phone    ||
        !payload.customer.country  ||
        !payload.customer.address1 ||
        !payload.customer.city     ||
        !payload.customer.postal
    ) {
        alert("Please fill all required fields.");
        return;
    }

    const btn = document.getElementById("place-order-btn");
    btn.disabled  = true;
    btn.innerText = "Processing...";

    try {
        const res = await fetch(PLACE_ORDER_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + ID_TOKEN
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.status === 401) {
            alert("Your session has expired. Please log in again.");
            window.location.href = LOGIN_URL;
            return;
        }

        if (res.ok) {
            alert("Order placed successfully! Order ID: " + data.order_id);
            window.location.href = "/store/order-confirmation/?id=" + data.order_id;
        } else {
            alert("Order failed: " + (data.error || data.message || "Unknown error"));
        }

    } catch (err) {
        console.error("Place order error:", err);
        alert("Something went wrong while placing your order.");
    } finally {
        btn.disabled  = false;
        btn.innerText = "Place Order";
    }
});

// ── Re-calculate when country OR city changes ─────────────────────────────────
document.getElementById("country").addEventListener("change", loadOrderSummary);
document.getElementById("city").addEventListener("change", loadOrderSummary);

// ── Boot ──────────────────────────────────────────────────────────────────────
autoFillLocation();
loadOrderSummary();
</script>
{% endblock %}
