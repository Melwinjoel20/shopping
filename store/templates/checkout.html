{% extends "base.html" %}
{% load static %}

{% block hero %}{% endblock %}

{% block content %}

<div class="container mt-5 mb-5">

    <h2 class="mb-4 fw-bold">🛍 Checkout</h2>

    <div class="row">

        <div class="col-md-7">

            <div class="card shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">Customer Details</h4>

                <form id="checkout-form">

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" class="form-control" id="phone" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Country</label>
                        <input type="text" class="form-control" id="country" value="Ireland" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address Line 1</label>
                        <input type="text" class="form-control" id="address1" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address Line 2</label>
                        <input type="text" class="form-control" id="address2">
                    </div>

                    <div class="row">
                        <div class="col-md-8 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" id="city" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">Postal Code</label>
                            <input type="text" class="form-control" id="postal" required>
                        </div>
                    </div>

                </form>

            </div>

            <!-- Payment Section -->
            <div class="card shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">Payment</h4>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="card" checked>
                    <label class="form-check-label">Credit/Debit Card</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="paypal">
                    <label class="form-check-label">PayPal</label>
                </div>

                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="paymentMethod" value="cod">
                    <label class="form-check-label">Cash on Delivery</label>
                </div>

            </div>

        </div>

        <div class="col-md-5">

            <div class="card shadow-sm p-4 mb-4">

                <h4 class="fw-bold mb-3">Order Summary</h4>

                <div id="order-items"></div>

                <hr>

                <p class="fw-bold fs-5">
                    Total: <span id="order-total" class="text-primary">€0.00</span>
                </p>

                <button type="button" class="btn btn-success w-100 mt-3" id="place-order-btn">
                    Place Order
                </button>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block extra_scripts %}
<script>
const VIEW_CART_URL = "{{ VIEW_CART_URL }}";
const PLACE_ORDER_URL = "{{ PLACE_ORDER_URL }}";
const USER_ID = "{{ request.session.user_id|default:'' }}";
const ID_TOKEN = "{{ request.session.cognito_id_token|default:'' }}";
const LOGIN_URL = "{% url 'login' %}";

// Redirect if not logged in
if (!USER_ID) {
    alert("Please log in to continue.");
    window.location.href = LOGIN_URL;
}

// Load cart items for summary
async function loadOrderSummary() {
    const container = document.getElementById("order-items");
    const totalSpan = document.getElementById("order-total");

    container.innerHTML = `<p class="text-muted">Loading order summary...</p>`;
    totalSpan.innerHTML = "€0.00";

    try {
        const res = await fetch(`${VIEW_CART_URL}?user_id=${encodeURIComponent(USER_ID)}`);
        const raw = await res.json();

        let items = [];

        // Handle API Gateway wrapped response
        if (raw.body) {
            items = JSON.parse(raw.body);
        } else if (Array.isArray(raw)) {
            items = raw;
        }

        container.innerHTML = "";

        if (!items || items.length === 0) {
            container.innerHTML = `<p class="text-muted">Your cart is empty.</p>`;
            totalSpan.innerHTML = "€0.00";
            return;
        }

        let total = 0;

        items.forEach(item => {
            const qty = Number(item.qty || 1);
            const price = Number(item.price || 0);
            const subtotal = price * qty;

            total += subtotal;

            container.innerHTML += `
                <div class="d-flex justify-content-between mb-2">
                    <span>${item.name || "Unnamed Product"} (×${qty})</span>
                    <span>€${subtotal.toFixed(2)}</span>
                </div>
            `;
        });

        totalSpan.innerHTML = `€${total.toFixed(2)}`;

    } catch (err) {
        console.error("Checkout summary error:", err);
        container.innerHTML = `<p class="text-danger">Failed to load order summary.</p>`;
        totalSpan.innerHTML = "€0.00";
    }
}


// Place Order
document.getElementById("place-order-btn").addEventListener("click", async () => {
    const payload = {
        user_id: USER_ID,
        payment_method: document.querySelector("input[name='paymentMethod']:checked").value,
        customer: {
            full_name: document.getElementById("fullName").value.trim(),
            email: document.getElementById("email").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            country: document.getElementById("country").value.trim(),
            address1: document.getElementById("address1").value.trim(),
            address2: document.getElementById("address2").value.trim(),
            city: document.getElementById("city").value.trim(),
            postal: document.getElementById("postal").value.trim()
        }
    };

    // Basic validation
    if (
        !payload.customer.full_name ||
        !payload.customer.email ||
        !payload.customer.phone ||
        !payload.customer.country ||
        !payload.customer.address1 ||
        !payload.customer.city ||
        !payload.customer.postal
    ) {
        alert("Please fill all required fields.");
        return;
    }

    const btn = document.getElementById("place-order-btn");
    btn.disabled = true;
    btn.innerText = "Processing...";

    try {
        const res = await fetch(PLACE_ORDER_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + ID_TOKEN
            },
            body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (res.status === 401) {
            alert("Your session has expired. Please log in again.");
            window.location.href = LOGIN_URL;
            return;
        }

        if (res.ok) {
            alert("Order placed successfully! Order ID: " + data.order_id);
            window.location.href = "/store/order-confirmation/?id=" + data.order_id;
        } else {
            alert("Order failed: " + (data.error || data.message || "Unknown error"));
        }

    } catch (err) {
        console.error("Place order error:", err);
        alert("Something went wrong while placing your order.");
    } finally {
        btn.disabled = false;
        btn.innerText = "Place Order";
    }
});

loadOrderSummary();
</script>
{% endblock %}
